name: Build and deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./out/
          protocol: ftps
          port: 21
          dangerous-clean-slate: false
          log-level: verbose

      - name: Diagnostic FTP listing
        run: |
          sudo apt-get install -y lftp
          echo "=== Listing FTP root and common paths ==="
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -e "set ssl:verify-certificate no; pwd; ls -la /; ls -la /public_html/ || true; ls -la /domains/ || true; ls -la /domains/tepamkepam.lt/public_html/ || true; bye" \
            ftps://${{ secrets.FTP_SERVER }}
